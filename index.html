<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบท้ายบทเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f2f2f2;
            -webkit-tap-highlight-color: transparent;
        }

        /* Kahoot Style Background */
        .kahoot-bg {
            background-color: #46178f;
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.1) 0%, transparent 20%),
                              radial-gradient(circle at bottom right, rgba(255,255,255,0.1) 0%, transparent 20%);
        }

        /* 3D Button Effect */
        .btn-3d {
            transition: all 0.1s ease;
            position: relative;
        }
        .btn-3d:active:not(:disabled) {
            transform: translateY(4px);
        }

        /* Choice Colors */
        .bg-kahoot-red { background-color: #E21B3C; box-shadow: 0 4px 0 #b0152f; color: white; }
        .bg-kahoot-blue { background-color: #1368CE; box-shadow: 0 4px 0 #0f51a1; color: white; }
        .bg-kahoot-yellow { background-color: #D89E00; box-shadow: 0 4px 0 #a87b00; color: white; }
        .bg-kahoot-green { background-color: #26890C; box-shadow: 0 4px 0 #1d6a09; color: white; }

        .btn-3d:active:not(:disabled) {
            box-shadow: 0 0px 0 transparent;
        }

        .choice-selected {
            filter: brightness(1.1);
            transform: scale(1.02);
            border: 4px solid white;
        }

        .choice-unselected {
            opacity: 0.7;
            filter: grayscale(40%);
        }

        /* Review Mode Highlights */
        .review-correct {
            border: 6px solid #26890C !important;
            box-shadow: 0 0 20px rgba(38, 137, 12, 0.5);
            opacity: 1 !important;
            filter: grayscale(0%) !important;
        }
        .review-wrong {
            border: 6px solid #E21B3C !important;
            opacity: 1 !important;
            filter: grayscale(0%) !important;
            box-shadow: 0 0 20px rgba(226, 27, 60, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .icon-shape {
            width: 32px;
            height: 32px;
            display: inline-block;
            margin-right: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="kahoot-bg min-h-screen text-gray-800 flex flex-col">

    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- ================= SCREEN 1: LOGIN/MENU ================= -->
        <div id="screen-menu" class="glass-panel w-full max-w-md p-8 text-center animate-fade-in">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-[#46178f] mb-2">สอบท้ายบทเรียน</h1>
                <p class="text-gray-600">วิชาคอมพิวเตอร์ (สุ่ม 10 ข้อ)</p>
            </div>

            <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm text-left">
                กรุณากรอกข้อมูลให้ครบถ้วน
            </div>

            <div class="space-y-4">
                <div>
                    <input type="text" id="student-name" placeholder="ชื่อ-นามสกุล" 
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-[#46178f] focus:outline-none font-semibold text-center text-lg placeholder-gray-400">
                </div>
                <div>
                    <select id="student-grade" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-[#46178f] focus:outline-none font-semibold text-center text-lg appearance-none bg-white">
                        <option value="" disabled selected>-- เลือกชั้นเรียน --</option>
                        <option value="ม.1">มัธยมศึกษาปีที่ 1 (ม.1)</option>
                        <option value="ม.2">มัธยมศึกษาปีที่ 2 (ม.2)</option>
                        <option value="ม.3">มัธยมศึกษาปีที่ 3 (ม.3)</option>
                    </select>
                </div>
                <button onclick="startQuiz()" class="w-full bg-[#333333] text-white font-bold py-4 rounded-lg text-xl btn-3d shadow-[0_4px_0_#000000] hover:bg-black mt-4">
                    เริ่มทำข้อสอบ
                </button>
            </div>
        </div>

        <!-- ================= SCREEN 2: QUIZ ================= -->
        <div id="screen-quiz" class="hidden w-full max-w-5xl flex flex-col h-[90vh]">
            <!-- Header -->
            <div class="flex justify-between items-center bg-white p-4 rounded-t-lg shadow-md mb-2">
                <div class="font-bold text-[#46178f]" id="display-info">ชื่อ: - | ชั้น: -</div>
                <div class="font-bold text-xl bg-gray-200 px-4 py-1 rounded-full"><span id="q-current">1</span> / 10</div>
            </div>

            <!-- Question Box -->
            <div class="bg-white p-6 md:p-10 rounded-lg shadow-md mb-4 flex-grow flex items-center justify-center text-center">
                <h2 id="q-text" class="text-2xl md:text-4xl font-bold leading-relaxed">โหลดคำถาม...</h2>
            </div>

            <!-- Choices Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-4">
                <button onclick="selectAnswer(0)" id="btn-choice-0" class="btn-3d bg-kahoot-red p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px]">
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><polygon points="12,2 22,22 2,22"/></svg>
                    <span id="choice-0-text" class="flex-grow">ก. ตัวเลือกที่ 1</span>
                </button>
                <button onclick="selectAnswer(1)" id="btn-choice-1" class="btn-3d bg-kahoot-blue p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px]">
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12"/></svg>
                    <span id="choice-1-text" class="flex-grow">ข. ตัวเลือกที่ 2</span>
                </button>
                <button onclick="selectAnswer(2)" id="btn-choice-2" class="btn-3d bg-kahoot-yellow p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px]">
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                    <span id="choice-2-text" class="flex-grow">ค. ตัวเลือกที่ 3</span>
                </button>
                <button onclick="selectAnswer(3)" id="btn-choice-3" class="btn-3d bg-kahoot-green p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px]">
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/></svg>
                    <span id="choice-3-text" class="flex-grow">ง. ตัวเลือกที่ 4</span>
                </button>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between mt-auto">
                <button onclick="prevQuestion()" id="btn-prev" class="invisible bg-gray-500 text-white font-bold py-3 px-6 rounded-lg btn-3d shadow-[0_4px_0_#374151]">
                    ◀ ย้อนกลับ
                </button>
                
                <!-- Normal Next -->
                <button onclick="nextQuestion()" id="btn-next" class="invisible bg-[#333333] text-white font-bold py-3 px-8 rounded-lg btn-3d shadow-[0_4px_0_#000000]">
                    ถัดไป ▶
                </button>

                <!-- Submit (Only on last question) -->
                <button onclick="confirmSubmit()" id="btn-submit" class="hidden bg-kahoot-green text-white font-bold py-3 px-8 rounded-lg btn-3d shadow-[0_4px_0_#1d6a09] animate-pulse">
                    ยืนยันการส่งคำตอบ ✓
                </button>
            </div>
        </div>

        <!-- ================= SCREEN 3: RESULT ================= -->
        <div id="screen-result" class="hidden glass-panel w-full max-w-xl p-8 md:p-12 text-center text-gray-800">
            <h1 class="text-4xl md:text-5xl font-bold mb-2">สรุปคะแนนสอบ</h1>
            <p id="result-info" class="text-xl text-gray-600 mb-8">ชื่อ: - | ชั้น: -</p>
            
            <div class="bg-white rounded-2xl p-8 shadow-inner mb-8">
                <p class="text-2xl font-semibold mb-4">คุณทำได้</p>
                <div class="text-7xl md:text-8xl font-black text-[#46178f]">
                    <span id="score-display">0</span> <span class="text-4xl text-gray-400">/ 10</span>
                </div>
            </div>

            <button onclick="startReview()" class="w-full bg-[#333333] text-white font-bold py-4 rounded-lg text-xl btn-3d shadow-[0_4px_0_#000000] hover:bg-black">
                ดูเฉลยคำตอบ ▶
            </button>
        </div>

        <!-- ================= SCREEN 4: REVIEW (ANSWER KEY) ================= -->
        <div id="screen-review" class="hidden w-full max-w-5xl flex flex-col h-[90vh]">
            <!-- Header -->
            <div class="flex justify-between items-center bg-white p-4 rounded-t-lg shadow-md mb-2 border-t-4 border-[#46178f]">
                <div class="font-bold text-[#46178f]">โหมดดูเฉลย</div>
                <div class="font-bold text-xl bg-gray-200 px-4 py-1 rounded-full"><span id="rev-current">1</span> / 10</div>
            </div>

            <!-- Question Box -->
            <div class="bg-white p-6 md:p-8 rounded-lg shadow-md mb-4 flex-grow flex flex-col items-center justify-center text-center">
                <h2 id="rev-q-text" class="text-xl md:text-3xl font-bold leading-relaxed mb-4">โหลดคำถาม...</h2>
                <div id="rev-status" class="px-6 py-2 rounded-full font-bold text-lg text-white">สถานะ</div>
            </div>

            <!-- Choices Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-4">
                <button id="rev-choice-0" class="btn-3d bg-kahoot-red p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px] opacity-70 cursor-default" disabled>
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><polygon points="12,2 22,22 2,22"/></svg>
                    <span id="rev-choice-0-text" class="flex-grow">ก.</span>
                    <span id="rev-icon-0" class="ml-2 hidden text-3xl"></span>
                </button>
                <button id="rev-choice-1" class="btn-3d bg-kahoot-blue p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px] opacity-70 cursor-default" disabled>
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12"/></svg>
                    <span id="rev-choice-1-text" class="flex-grow">ข.</span>
                    <span id="rev-icon-1" class="ml-2 hidden text-3xl"></span>
                </button>
                <button id="rev-choice-2" class="btn-3d bg-kahoot-yellow p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px] opacity-70 cursor-default" disabled>
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                    <span id="rev-choice-2-text" class="flex-grow">ค.</span>
                    <span id="rev-icon-2" class="ml-2 hidden text-3xl"></span>
                </button>
                <button id="rev-choice-3" class="btn-3d bg-kahoot-green p-4 md:p-6 rounded-lg text-left text-lg md:text-xl font-semibold flex items-center min-h-[100px] opacity-70 cursor-default" disabled>
                    <svg class="icon-shape text-white fill-current" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/></svg>
                    <span id="rev-choice-3-text" class="flex-grow">ง.</span>
                    <span id="rev-icon-3" class="ml-2 hidden text-3xl"></span>
                </button>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between mt-auto">
                <button onclick="prevReview()" id="btn-rev-prev" class="invisible bg-gray-500 text-white font-bold py-3 px-6 rounded-lg btn-3d shadow-[0_4px_0_#374151]">
                    ◀ ย้อนกลับ
                </button>
                
                <button onclick="nextReview()" id="btn-rev-next" class="bg-[#333333] text-white font-bold py-3 px-8 rounded-lg btn-3d shadow-[0_4px_0_#000000]">
                    ถัดไป ▶
                </button>

                <button onclick="location.reload()" id="btn-rev-finish" class="hidden bg-kahoot-blue text-white font-bold py-3 px-8 rounded-lg btn-3d shadow-[0_4px_0_#0f51a1]">
                    กลับสู่หน้าแรก ↺
                </button>
            </div>
        </div>

    </main>

    <script>
    // URL สำหรับส่งข้อมูลไป Google Sheets
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwwAHibh9Ke0ZDzxahob0-67mXlfFIcxl1nw0CSUXDaGxSL9I5NOv6Yc0zxtjNTeZsW/exec';

    // ตัวแปรเก็บข้อมูล
    let allQuestions = [];
    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let studentName = '';
    let studentGrade = '';
    let userAnswers = [];

    // --- (ส่วนนี้คือข้อมูลข้อสอบ 30 ข้อ ให้คุณใช้ข้อมูลชุดเดิมที่มีอยู่ได้เลย) ---
    // เพื่อไม่ให้โค้ดยาวเกินไป ให้คงตัวแปร const rawQuestions = [ ... ]; ของคุณไว้ตามเดิม
    // -----------------------------------------------------------

    // ฟังก์ชันเริ่มการสอบ
    function startQuiz() {
        studentName = document.getElementById('studentName').value;
        studentGrade = document.getElementById('studentGrade').value;

        if (!studentName) {
            alert('กรุณากรอกชื่อ-สกุลก่อนเริ่มทำข้อสอบครับ');
            return;
        }

        // สุ่มข้อสอบ 10 ข้อจากทั้งหมด
        selectedQuestions = [...rawQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        loadQuestion();
    }

    // ฟังก์ชันโหลดข้อสอบแต่ละข้อ
    function loadQuestion() {
        const q = selectedQuestions[currentQuestionIndex];
        document.getElementById('question-number').innerText = `ข้อที่ ${currentQuestionIndex + 1} / 10`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            // รูปแบบปุ่มสไตล์ Kahoot! (ปรับแต่ง CSS class ให้ตรงกับที่คุณใช้อยู่)
            btn.className = 'w-full text-left p-4 rounded-lg text-white font-bold text-lg mb-4 hover:opacity-80 transition option-btn';
            
            // กำหนดสีปุ่ม
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
            btn.classList.add(colors[index]);
            
            btn.onclick = () => selectOption(index, btn);
            optionsDiv.appendChild(btn);
        });

        // ควบคุมปุ่มย้อนกลับ/ถัดไป
        document.getElementById('prev-btn').classList.toggle('hidden', currentQuestionIndex === 0);
        
        if (currentQuestionIndex === selectedQuestions.length - 1) {
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('submit-btn').classList.remove('hidden');
        } else {
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
        }
    }

    // ฟังก์ชันเลือกคำตอบ
    function selectOption(index, btnElement) {
        userAnswers[currentQuestionIndex] = index;
        
        // ล้างสถานะปุ่มอื่น
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.style.border = 'none');
        
        // ไฮไลต์ปุ่มที่เลือก
        btnElement.style.border = '4px solid white';
    }

    // ไปข้อถัดไป
    function nextQuestion() {
        if (currentQuestionIndex < selectedQuestions.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        }
    }

    // ย้อนกลับ
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    // ฟังก์ชันส่งคำตอบ และบันทึกลง Google Sheets
    function submitQuiz() {
        // ตรวจสอบว่าทำครบทุกข้อหรือไม่ (ถ้าจำเป็น)
        
        // คำนวณคะแนน
        score = 0;
        selectedQuestions.forEach((q, index) => {
            if (userAnswers[index] === q.correct) {
                score++;
            }
        });

        // ---------------------------------------------------------
        // ส่วนเชื่อมต่อเพื่อส่งข้อมูลไป Google Sheets
        // ---------------------------------------------------------
        const studentData = {
            name: studentName,
            grade: studentGrade,
            score: score
        };

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "กำลังบันทึกข้อมูล...";
        submitBtn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(studentData)
        })
        .then(response => {
            console.log('บันทึกสำเร็จ!', response);
            showResultScreen();
        })
        .catch(error => {
            console.error('เกิดข้อผิดพลาด!', error.message);
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล แต่คุณสามารถดูคะแนนได้ครับ');
            showResultScreen();
        });
    }

    // ฟังก์ชันแสดงหน้าคะแนน
    function showResultScreen() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / 10`;
    }

    // ฟังก์ชันดูเฉลย
    function viewAnswers() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('answers-screen').classList.remove('hidden');
        
        const answersDiv = document.getElementById('answers-list');
        answersDiv.innerHTML = '';

        selectedQuestions.forEach((q, index) => {
            const userAnswerIndex = userAnswers[index];
            const isCorrect = userAnswerIndex === q.correct;
            
            const div = document.createElement('div');
            div.className = 'bg-white p-4 rounded shadow mb-4 text-left';
            
            let html = `<p class="font-bold mb-2">ข้อ ${index + 1}: ${q.question}</p>`;
            
            q.options.forEach((opt, optIndex) => {
                let style = 'p-2 rounded mb-1 ';
                if (optIndex === q.correct) {
                    style += 'bg-green-200 border-2 border-green-500'; // ข้อที่ถูก
                } else if (optIndex === userAnswerIndex && !isCorrect) {
                    style += 'bg-red-200 border-2 border-red-500'; // ข้อที่นักเรียนตอบผิด
                } else {
                    style += 'bg-gray-100'; // ข้ออื่นๆ
                }
                html += `<div class="${style}">${opt}</div>`;
            });

            html += `<p class="text-sm text-gray-600 mt-2"><strong>คำอธิบาย:</strong> ${q.explanation}</p>`;
            div.innerHTML = html;
            answersDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
