<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบท้ายบทเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f2f2f2; }
        .kahoot-bg { background-color: #46178f; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="kahoot-bg min-h-screen flex items-center justify-center p-4">

    <!-- หน้าเมนู -->
    <div id="menu-screen" class="glass-panel w-full max-w-md p-8 text-center">
        <h1 class="text-3xl font-bold text-[#46178f] mb-6">สอบท้ายบทเรียน</h1>
        <div id="error-msg" class="hidden bg-red-100 text-red-700 p-2 rounded mb-4">กรุณากรอกชื่อและเลือกชั้นเรียน</div>
        <input type="text" id="studentName" placeholder="ชื่อ-นามสกุล" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg mb-4 text-center text-lg">
        <select id="studentGrade" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg mb-6 text-center text-lg">
            <option value="" disabled selected>-- เลือกชั้นเรียน --</option>
            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
        </select>
        <button onclick="startQuiz()" class="w-full bg-black text-white font-bold py-4 rounded-lg text-xl hover:bg-gray-800">เริ่มทำข้อสอบ</button>
    </div>

    <!-- หน้าทำข้อสอบ -->
    <div id="quiz-screen" class="hidden w-full max-w-4xl bg-white p-8 rounded-lg shadow-lg">
        <div class="text-right font-bold text-lg mb-4">ข้อที่ <span id="q-current">1</span> / 10</div>
        <h2 id="question-text" class="text-2xl font-bold mb-8 text-center">โหลดคำถาม...</h2>
        <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div class="flex justify-between mt-8">
            <button id="prev-btn" onclick="prevQuestion()" class="bg-gray-500 text-white px-8 py-3 rounded-lg font-bold hidden">ย้อนกลับ</button>
            <button id="next-btn" onclick="nextQuestion()" class="bg-black text-white px-8 py-3 rounded-lg font-bold">ถัดไป</button>
            <button id="submit-btn" onclick="submitQuiz()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold hidden">ส่งคำตอบ</button>
        </div>
    </div>

    <!-- หน้าสรุปคะแนน -->
    <div id="result-screen" class="hidden glass-panel w-full max-w-md p-8 text-center">
        <h1 class="text-3xl font-bold mb-4">คะแนนของคุณ</h1>
        <p class="text-6xl font-bold text-[#46178f] mb-8" id="final-score">0 / 10</p>
        <button onclick="viewAnswers()" class="bg-black text-white px-8 py-3 rounded-lg font-bold">ดูเฉลย</button>
    </div>

    <!-- หน้าเฉลย -->
    <div id="answers-screen" class="hidden w-full max-w-4xl bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-6">เฉลยคำตอบ</h2>
        <div id="answers-list" class="space-y-6"></div>
        <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-lg mt-8 font-bold">ทำแบบทดสอบใหม่</button>
    </div>

    <script>
    // --------------------------------------------------------------------------
    // ใส่ URL ของ Google Web App ที่ได้จากขั้นตอน Deployment ลงที่นี่
    // --------------------------------------------------------------------------
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwwAHibh9Ke0ZDzxahob0-67mXlfFIcxl1nw0CSUXDaGxSL9I5NOv6Yc0zxtjNTeZsW/exec';

    // ฐานข้อมูลข้อสอบ 30 ข้อ (คุณครูสามารถเพิ่ม/แก้ไขโจทย์ได้ที่นี่)
    const rawQuestions = [
        { q: "1. ระบบคอมพิวเตอร์ประกอบด้วยองค์ประกอบหลักกี่ส่วน อะไรบ้าง?", opts: ["ก. 2 ส่วน", "ข. 3 ส่วน", "ค. 4 ส่วน", "ง. 5 ส่วน"], ans: 2, exp: "4 ส่วน คือ ฮาร์ดแวร์, ซอฟต์แวร์, บุคลากร และ ข้อมูล/สารสนเทศ" },
        // ... (ครูสามารถใส่โจทย์ให้ครบ 30 ข้อตามรูปแบบนี้ได้เลยครับ)
    ];

    let selectedQuestions = [], currentQuestionIndex = 0, score = 0, userAnswers = new Array(10).fill(null);
    let studentName = '', studentGrade = '';

    function startQuiz() {
        studentName = document.getElementById('studentName').value;
        studentGrade = document.getElementById('studentGrade').value;
        if (!studentName || !studentGrade) { document.getElementById('error-msg').classList.remove('hidden'); return; }
        
        selectedQuestions = [...rawQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }
    
    function loadQuestion() {
        const q = selectedQuestions[currentQuestionIndex];
        document.getElementById('q-current').innerText = currentQuestionIndex + 1;
        document.getElementById('question-text').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'p-6 rounded-lg text-white font-bold text-lg ' + ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'][idx];
            btn.innerText = opt;
            btn.onclick = () => { userAnswers[currentQuestionIndex] = idx; loadQuestion(); };
            if(userAnswers[currentQuestionIndex] === idx) btn.classList.add('ring-4', 'ring-white');
            optionsDiv.appendChild(btn);
        });
        document.getElementById('prev-btn').classList.toggle('hidden', currentQuestionIndex === 0);
        document.getElementById('next-btn').classList.toggle('hidden', currentQuestionIndex === 9);
        document.getElementById('submit-btn').classList.toggle('hidden', currentQuestionIndex !== 9);
    }

    function nextQuestion() { if(currentQuestionIndex < 9) { currentQuestionIndex++; loadQuestion(); } }
    function prevQuestion() { if(currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); } }

    function submitQuiz() {
        score = selectedQuestions.reduce((acc, q, i) => acc + (userAnswers[i] === q.ans ? 1 : 0), 0);
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name: studentName, grade: studentGrade, score: score}) });
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score + " / 10";
    }

    function viewAnswers() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('answers-screen').classList.remove('hidden');
        const list = document.getElementById('answers-list');
        selectedQuestions.forEach((q, i) => {
            list.innerHTML += `<div class="border-b pb-4"><div><strong>ข้อ ${i+1}:</strong> ${q.q}</div><div class="text-green-600 font-bold mt-2">เฉลย: ${q.opts[q.ans]}</div><div class="text-sm text-gray-500">อธิบาย: ${q.exp}</div></div>`;
        });
    }
    </script>
</body>
</html>
